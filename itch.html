<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NASA Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #07090f;
      --surface: #0d1120;
      --border:  #1a2540;
      --text:    #b8ccdf;
      --muted:   #4a6080;
      --accent:  #3d9eff;
      --hazard:  #ff5e3a;
      --safe:    #3dcc8e;
      --mono:    'Courier New', monospace;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── Stars background ─────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 10%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 40%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 90%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 45%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 15%, #fff 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 5% 50%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 60% 70%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 80% 25%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 35%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 65%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 95%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 30%, rgba(255,255,255,0.3) 0%, transparent 100%);
      opacity: 0.8;
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 48px;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 32px 0 28px;
    }

    header h1 {
      font-family: var(--mono);
      font-size: clamp(18px, 4vw, 28px);
      letter-spacing: 0.18em;
      color: #fff;
      text-transform: uppercase;
    }

    header h1 span { color: var(--accent); }

    header p {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.06em;
    }

    .tabs {
      display: flex;
      gap: 2px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.1em;
      padding: 10px 20px;
      text-transform: uppercase;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .panel { display: none; }
    .panel.active { display: block; animation: fadeUp 0.25s ease; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }

    .card-title {
      font-family: var(--mono);
      font-size: 13px;
      color: #fff;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
    }

    .label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #apod-img {
      width: 100%;
      border-radius: 4px;
      display: block;
      margin-bottom: 16px;
      max-height: 420px;
      object-fit: cover;
    }

    #apod-title {
      font-family: var(--mono);
      font-size: 15px;
      color: #fff;
      margin-bottom: 6px;
    }

    #apod-meta {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 14px;
      font-family: var(--mono);
    }

    #apod-text {
      font-size: 13px;
      line-height: 1.75;
      color: var(--text);
    }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .date-nav input[type="date"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 10px;
      outline: none;
    }

    .date-nav input[type="date"]:focus { border-color: var(--accent); }

    .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      padding: 7px 14px;
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn:active { opacity: 0.7; }
    .btn.primary { border-color: var(--accent); color: var(--accent); }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .photo-thumb {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 4px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .photo-thumb:hover { border-color: var(--accent); }

    .photo-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.2s;
    }

    .photo-thumb:hover img { transform: scale(1.04); }

    .photo-cam {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(7,9,15,0.85);
      font-family: var(--mono);
      font-size: 10px;
      padding: 4px 6px;
      color: var(--accent);
      letter-spacing: 0.06em;
    }

    .camera-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .cam-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      padding: 4px 9px;
      text-transform: uppercase;
      transition: all 0.12s;
    }

    .cam-btn:hover, .cam-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(7,9,15,0.95);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      padding: 20px;
    }

    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    #lightbox-close {
      position: absolute;
      top: 16px; right: 20px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
    }

    #lightbox-close:hover { color: #fff; }

    #lightbox-meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }

    .neo-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .neo-row:last-child { border-bottom: none; }

    .neo-name {
      font-family: var(--mono);
      font-size: 13px;
      color: #fff;
    }

    .neo-name.hazard { color: var(--hazard); }

    .neo-stats {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .neo-badge {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 3px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .neo-badge.safe    { background: rgba(61,204,142,0.12); color: var(--safe); border: 1px solid rgba(61,204,142,0.3); }
    .neo-badge.danger  { background: rgba(255,94,58,0.12);  color: var(--hazard); border: 1px solid rgba(255,94,58,0.3); }

    #danger-ring-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 28px 0 20px;
    }

    #danger-ring-wrap svg { overflow: visible; }

    .ring-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-align: center;
    }

    #ring-value {
      font-family: var(--mono);
      font-size: 22px;
      color: #fff;
      text-align: center;
    }

    #ring-name {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 4px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.1em;
    }

    .loading::after {
      content: '';
      display: inline-block;
      width: 12px;
      animation: dots 1.2s steps(4, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }

    footer {
      text-align: center;
      padding-top: 32px;
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: 0.06em;
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    @media (max-width: 500px) {
      .photo-grid { grid-template-columns: repeat(2, 1fr); }
      .date-nav { gap: 6px; }
    }
  </style>
</head>
<body>

<div id="app">
  <header>
    <h1>NASA <span>EXPLORER</span></h1>
    <p>Open data from NASA's public APIs</p>
  </header>

  <nav class="tabs">
    <button class="tab active" onclick="switchTab('apod', this)">APOD</button>
    <button class="tab" onclick="switchTab('mars', this)">Mars</button>
    <button class="tab" onclick="switchTab('neo',  this)">Asteroids</button>
  </nav>

  <section id="panel-apod" class="panel active">
    <div class="date-nav">
      <span class="label">Date</span>
      <input type="date" id="apod-date" onchange="loadApod(this.value)" />
      <button class="btn" onclick="offsetApodDate(-1)">← Prev</button>
      <button class="btn" onclick="offsetApodDate(1)">Next →</button>
      <button class="btn primary" onclick="loadApod()">Today</button>
    </div>
    <div id="apod-content" class="loading">Loading</div>
  </section>

  <section id="panel-mars" class="panel">
    <div class="card" style="margin-bottom:16px">
      <div class="label" style="margin-bottom:10px">Camera filter</div>
      <div class="camera-filter" id="cam-filter"></div>
    </div>
    <div id="mars-content" class="loading">Loading</div>
  </section>

  <!-- NEO ───────────────────────────────────────────────────────────── -->
  <section id="panel-neo" class="panel">
    <div class="card" style="margin-bottom:16px">
      <div class="label" style="margin-bottom:4px">Closest hazardous approach</div>
      <div id="danger-ring-wrap">
        <svg id="danger-svg" width="140" height="140" viewBox="0 0 140 140">
          <circle cx="70" cy="70" r="58" fill="none" stroke="#1a2540" stroke-width="8"/>
          <circle id="ring-arc" cx="70" cy="70" r="58" fill="none"
                  stroke="#3dcc8e" stroke-width="8"
                  stroke-dasharray="364" stroke-dashoffset="364"
                  stroke-linecap="round"
                  transform="rotate(-90 70 70)"
                  style="transition: stroke-dashoffset 1s ease, stroke 1s ease"/>
          <text x="70" y="65" text-anchor="middle"
                font-family="'Courier New', monospace" font-size="13" fill="#b8ccdf" id="ring-km">—</text>
          <text x="70" y="82" text-anchor="middle"
                font-family="'Courier New', monospace" font-size="9" fill="#4a6080">million km</text>
        </svg>
        <div class="ring-label">Nearest asteroid in feed</div>
        <div id="ring-name">—</div>
      </div>
    </div>
    <div id="neo-content" class="loading">Loading</div>
  </section>
</div>

<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()"/>
  <div id="lightbox-meta"></div>
</div>

<footer>
  <a href="https://api.nasa.gov/" target="_blank">api.nasa.gov</a>
  &nbsp;·&nbsp; data provided by NASA
</footer>

<script>
const API_KEY = 'DEMO_KEY';   // replace with your key from api.nasa.gov
const BASE    = 'https://api.nasa.gov';

const DEMO = {
  apod: {
    date: '2024-07-04',
    title: 'The Crab Nebula in Multiwavelength',
    explanation: 'The Crab Nebula (M1) is a supernova remnant about 6,500 light-years away in Taurus. This composite combines data from Chandra X-ray (blue and white), Hubble (yellow), Spitzer infrared (pink), and VLT (red). At its center lies a pulsar — a neutron star spinning 30 times per second — that powers the entire nebula\'s glow. The Crab spans roughly 11 light-years and is one of the most-studied objects in the sky.',
    url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/Crab_Nebula.jpg/960px-Crab_Nebula.jpg',
    hdurl: 'https://upload.wikimedia.org/wikipedia/commons/0/00/Crab_Nebula.jpg',
    copyright: 'NASA, ESA, Chandra, Hubble, Spitzer',
  },
  mars: [
    { id:102693, sol:1000, earth_date:'2015-05-30', camera:{name:'FHAZ', full_name:'Front Hazard Avoidance Camera'}, img_src:'https://mars.jpl.nasa.gov/msl-raw-images/proj/msl/redops/ods/surface/sol/01000/opgs/edr/fcam/FLB_486615455EDR_F0481570FHAZ00323M_.JPG', rover:{name:'Curiosity'} },
    { id:102694, sol:1000, earth_date:'2015-05-30', camera:{name:'NAVCAM', full_name:'Navigation Camera'}, img_src:'https://mars.jpl.nasa.gov/msl-raw-images/proj/msl/redops/ods/surface/sol/01000/opgs/edr/ncam/NLB_486615680EDR_F0481570NCAM00207M_.JPG', rover:{name:'Curiosity'} },
    { id:102695, sol:1000, earth_date:'2015-05-30', camera:{name:'MAST', full_name:'Mast Camera'}, img_src:'https://mars.jpl.nasa.gov/msl-raw-images/msss/01000/mcam/1000MR0044631400500570E01_DXXX.jpg', rover:{name:'Curiosity'} },
    { id:102696, sol:1000, earth_date:'2015-05-30', camera:{name:'CHEMCAM', full_name:'Chemistry and Camera Complex'}, img_src:'https://mars.jpl.nasa.gov/msl-raw-images/proj/msl/redops/ods/surface/sol/01000/opgs/edr/ccam/CR0_486630530EDR_F0481570CCAM05000M_.JPG', rover:{name:'Curiosity'} },
    { id:102697, sol:1000, earth_date:'2015-05-30', camera:{name:'RHAZ', full_name:'Rear Hazard Avoidance Camera'}, img_src:'https://mars.jpl.nasa.gov/msl-raw-images/proj/msl/redops/ods/surface/sol/01000/opgs/edr/rcam/RLB_486615614EDR_F0481570RHAZ00323M_.JPG', rover:{name:'Curiosity'} },
  ],
  neo: {
    element_count: 5,
    near_earth_objects: {
      '2024-07-01': [
        { name:'(2010 PK9)', is_potentially_hazardous_asteroid:false, estimated_diameter:{meters:{estimated_diameter_min:91.7, estimated_diameter_max:205.1}}, close_approach_data:[{close_approach_date:'2024-07-01', relative_velocity:{kilometers_per_hour:'48234.7'}, miss_distance:{kilometers:'4823490.2'}}] },
        { name:'(2015 XC352)', is_potentially_hazardous_asteroid:false, estimated_diameter:{meters:{estimated_diameter_min:28.0, estimated_diameter_max:62.6}}, close_approach_data:[{close_approach_date:'2024-07-01', relative_velocity:{kilometers_per_hour:'29801.3'}, miss_distance:{kilometers:'7119342.1'}}] },
      ],
      '2024-07-02': [
        { name:'1566 Icarus (1949 MA)', is_potentially_hazardous_asteroid:true, estimated_diameter:{meters:{estimated_diameter_min:977.4, estimated_diameter_max:2185.3}}, close_approach_data:[{close_approach_date:'2024-07-02', relative_velocity:{kilometers_per_hour:'104237.5'}, miss_distance:{kilometers:'2948120.7'}}] },
        { name:'(2019 SB6)', is_potentially_hazardous_asteroid:false, estimated_diameter:{meters:{estimated_diameter_min:13.2, estimated_diameter_max:29.5}}, close_approach_data:[{close_approach_date:'2024-07-02', relative_velocity:{kilometers_per_hour:'57412.9'}, miss_distance:{kilometers:'1542978.3'}}] },
      ],
      '2024-07-03': [
        { name:'(2019 BH)', is_potentially_hazardous_asteroid:false, estimated_diameter:{meters:{estimated_diameter_min:37.3, estimated_diameter_max:83.4}}, close_approach_data:[{close_approach_date:'2024-07-03', relative_velocity:{kilometers_per_hour:'72318.4'}, miss_distance:{kilometers:'5601832.0'}}] },
      ],
    },
  },
};

let marsPhotos    = [];
let activeCam     = 'ALL';
let apodDateStr   = '';

async function apiFetch(path, params = {}) {
  params.api_key = API_KEY;
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(`${BASE}${path}?${qs}`);
  if (!res.ok) throw new Error(res.status);
  return res.json();
}

async function loadApod(date) {
  const el = document.getElementById('apod-content');
  el.className = 'loading'; el.textContent = 'Loading';

  let data;
  try {
    const params = date ? { date } : {};
    data = await apiFetch('/planetary/apod', params);
  } catch {
    data = DEMO.apod;
    if (!date) date = data.date;
  }

  apodDateStr = data.date;
  const dateInput = document.getElementById('apod-date');
  dateInput.value = data.date;
  dateInput.max = todayStr();
  dateInput.min = '1995-06-16';

  el.className = '';
  el.innerHTML = `
    <img id="apod-img" src="${data.url}" alt="${data.title}"
         onerror="this.style.display='none'" />
    <div id="apod-title">${data.title}</div>
    <div id="apod-meta">
      ${data.date}${data.copyright ? ' &nbsp;·&nbsp; © ' + data.copyright : ''}
      ${data.media_type === 'video' ? ' &nbsp;·&nbsp; <a href="' + data.url + '" target="_blank" style="color:var(--accent)">Watch video ↗</a>' : ''}
    </div>
    <hr class="divider"/>
    <p id="apod-text">${data.explanation}</p>
    ${data.hdurl && data.media_type === 'image'
      ? `<p style="margin-top:14px"><a href="${data.hdurl}" target="_blank" class="btn">HD Image ↗</a></p>`
      : ''}
  `;
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function offsetApodDate(delta) {
  const d = new Date(apodDateStr || todayStr());
  d.setDate(d.getDate() + delta);
  const s = d.toISOString().slice(0, 10);
  if (s > todayStr() || s < '1995-06-16') return;
  loadApod(s);
}

async function loadMars() {
  const el = document.getElementById('mars-content');
  el.className = 'loading'; el.textContent = 'Loading';

  try {
    const data = await apiFetch('/mars-photos/api/v1/rovers/curiosity/photos', { sol: 1000 });
    marsPhotos = data.photos || [];
  } catch {
    marsPhotos = DEMO.mars;
  }

  buildCamFilter();
  renderMarsPhotos();
}

function buildCamFilter() {
  const cams = ['ALL', ...new Set(marsPhotos.map(p => p.camera.name))];
  const wrap = document.getElementById('cam-filter');
  wrap.innerHTML = cams.map(c =>
    `<button class="cam-btn${c === activeCam ? ' active' : ''}"
             onclick="setCam('${c}')">${c}</button>`
  ).join('');
}

function setCam(cam) {
  activeCam = cam;
  document.querySelectorAll('.cam-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === cam);
  });
  renderMarsPhotos();
}

function renderMarsPhotos() {
  const filtered = activeCam === 'ALL' ? marsPhotos : marsPhotos.filter(p => p.camera.name === activeCam);
  const el = document.getElementById('mars-content');
  if (!filtered.length) { el.innerHTML = '<p style="color:var(--muted);font-size:12px;text-align:center;padding:24px">No photos for this camera.</p>'; return; }

  el.className = '';
  el.innerHTML = `
    <div class="label" style="margin-bottom:12px">
      ${filtered.length} photo${filtered.length !== 1 ? 's' : ''} — Curiosity Sol 1000
    </div>
    <div class="photo-grid">
      ${filtered.map(p => `
        <div class="photo-thumb" onclick="openLightbox('${p.img_src}', '${p.camera.full_name} · Sol ${p.sol} · ${p.earth_date}')">
          <img src="${p.img_src}" alt="${p.camera.name}" loading="lazy"
               onerror="this.parentElement.style.display='none'"/>
          <div class="photo-cam">${p.camera.name}</div>
        </div>
      `).join('')}
    </div>
  `;
}

async function loadNeo() {
  const el = document.getElementById('neo-content');
  el.className = 'loading'; el.textContent = 'Loading';

  let data;
  try {
    const today = todayStr();
    const end   = new Date(); end.setDate(end.getDate() + 6);
    data = await apiFetch('/neo/rest/v1/feed', {
      start_date: today,
      end_date: end.toISOString().slice(0, 10),
    });
  } catch {
    data = DEMO.neo;
  }

  const allObjects = Object.values(data.near_earth_objects).flat();
  const total = data.element_count;
  const hazardous = allObjects.filter(o => o.is_potentially_hazardous_asteroid);

  // Danger ring — closest miss distance overall
  const closest = allObjects.reduce((best, o) => {
    const km = parseFloat(o.close_approach_data[0]?.miss_distance?.kilometers || Infinity);
    return km < best.km ? { km, name: o.name, hazard: o.is_potentially_hazardous_asteroid } : best;
  }, { km: Infinity, name: '—', hazard: false });

  updateDangerRing(closest);

  // Render list
  const sorted = allObjects.sort((a, b) => {
    const ka = parseFloat(a.close_approach_data[0]?.miss_distance?.kilometers || Infinity);
    const kb = parseFloat(b.close_approach_data[0]?.miss_distance?.kilometers || Infinity);
    return ka - kb;
  });

  el.className = '';
  el.innerHTML = `
    <div class="label" style="margin-bottom:16px">
      ${total} near-earth objects · ${hazardous.length} potentially hazardous
    </div>
    ${sorted.map(o => {
      const ca    = o.close_approach_data[0];
      const km    = parseFloat(ca?.miss_distance?.kilometers || 0);
      const speed = parseFloat(ca?.relative_velocity?.kilometers_per_hour || 0);
      const diam  = o.estimated_diameter.meters;
      const h     = o.is_potentially_hazardous_asteroid;
      return `
        <div class="neo-row">
          <div>
            <div class="neo-name${h ? ' hazard' : ''}">${o.name}</div>
            <div class="neo-stats">
              ${ca?.close_approach_date} &nbsp;·&nbsp;
              ${(km / 1e6).toFixed(2)}M km miss &nbsp;·&nbsp;
              ${(speed / 1000).toFixed(1)}k km/h &nbsp;·&nbsp;
              ${diam.estimated_diameter_min.toFixed(0)}–${diam.estimated_diameter_max.toFixed(0)} m
            </div>
          </div>
          <span class="neo-badge ${h ? 'danger' : 'safe'}">${h ? 'Hazardous' : 'Safe'}</span>
        </div>
      `;
    }).join('')}
  `;
}

function updateDangerRing({ km, name, hazard }) {
  const MAX_KM = 10_000_000;
  const pct    = Math.min(km / MAX_KM, 1);
  const CIRC   = 2 * Math.PI * 58; // r=58
  const offset = CIRC * (1 - pct);
  const color  = hazard ? '#ff5e3a' : pct > 0.6 ? '#3dcc8e' : pct > 0.3 ? '#f0c040' : '#ff5e3a';

  const arc = document.getElementById('ring-arc');
  arc.style.strokeDashoffset = offset;
  arc.style.stroke = color;

  document.getElementById('ring-km').textContent  = (km / 1e6).toFixed(2);
  document.getElementById('ring-name').textContent = name;
}

function openLightbox(src, meta) {
  document.getElementById('lightbox-img').src  = src;
  document.getElementById('lightbox-meta').textContent = meta;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

let loaded = { apod: false, mars: false, neo: false };

function switchTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
  if (!loaded[id]) { loaded[id] = true; loaders[id](); }
}

const loaders = { apod: () => loadApod(), mars: loadMars, neo: loadNeo };

loaded.apod = true;
loadApod();
</script>
